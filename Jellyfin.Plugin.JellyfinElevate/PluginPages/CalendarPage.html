<div id="je-loading">Loading…</div>
<div data-role="content">
  <div class="content-primary je-calendar-page" style="padding: 0 !important;">
    <div id="je-calendar-container"></div>
  </div>
</div>
<div id="je-error" style="display:none">
  Jellyfin Elevate not ready.
</div>
<script>
(function () {
  const MAX_WAIT = 5000;
  const INTERVAL = 50;
  let waited = 0;

  const loadingEl = document.getElementById("je-loading");
  const errorEl = document.getElementById("je-error");
  const preferencesPages = Array.from(document.querySelectorAll("#userPluginPreferencesPage"));
  const preferencesPage = preferencesPages.find(p => p.offsetWidth > 0 && p.offsetHeight > 0);

  // Keep this page's own authored container; drop only stray copies that are not
  // inside a visible preferences page. Recreate into our own page (never gated on
  // a visible #userPluginPreferencesPage existing) so the page can't blank out —
  // mirrors BookmarksPage.
  const ownPage = document.querySelector(".je-calendar-page");
  document.querySelectorAll("#je-calendar-container").forEach(el => {
    if (ownPage && ownPage.contains(el)) return;
    if (!preferencesPage || !preferencesPage.contains(el)) {
      el.remove();
    }
  });

  if (!ownPage?.querySelector("#je-calendar-container")) {
    const newContainer = document.createElement("div");
    newContainer.id = "je-calendar-container";
    const target = ownPage || document.body;
    target.appendChild(newContainer);
  }

  const JE = window.JellyfinElevate;

  const timer = setInterval(() => {

    if (JE && JE.calendarPage) {
      clearInterval(timer);

      loadingEl.remove();
      JE.calendarPage.injectStyles();
      JE.calendarPage.loadSettings();
      JE.calendarPage.renderPage();
      JE.calendarPage.refresh()
      document.addEventListener("click", JE.calendarPage.handleEventClick);
      console.log('🪼 Jellyfin Elevate: Calendar Page Loaded.');
      return;
    }

    waited += INTERVAL;
    if (waited >= MAX_WAIT) {
      clearInterval(timer);

      loadingEl.style.display = "none";
      errorEl.style.display = "block";
    }
  }, INTERVAL);
})();
</script>

<style>
  .je-calendar-header {
    padding-top: 0px;
  }
</style>
