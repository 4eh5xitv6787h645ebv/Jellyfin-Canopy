repos:
- repo: https://github.com/gitleaks/gitleaks
  rev: v8.16.3
  hooks:
  - id: gitleaks
- repo: local
  hooks:
  - id: eslint-advisory
    name: ESLint (advisory)
    entry: env JC_LINT_OUTPUT=compact ./verify.sh lint
    language: system
    files: '\.(cjs|js|mjs|ts|tsx)$'
    pass_filenames: false
    verbose: true
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.4.0
  hooks:
  - id: end-of-file-fixer
  - id: trailing-whitespace
