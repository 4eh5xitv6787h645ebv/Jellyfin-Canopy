name: Build & Test

# The quality gate for every change: both plugin runtimes must compile
# (Jellyfin 10.11 / net9.0 and Jellyfin 12 / net10.0), unit tests must pass,
# and the client scripts must parse and lint cleanly. Before this workflow a
# PR could break compilation and still merge green.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-plugin:
    name: Plugin (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: jf10, tfm: net9.0 }
          - { name: jf12, tfm: net10.0 }
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Build (Release, ${{ matrix.target.name }})
        run: dotnet build Jellyfin.Plugin.JellyfinEnhanced/JellyfinEnhanced.csproj -c Release -p:JellyfinTarget=${{ matrix.target.name }}

      - name: Assert DLL produced
        run: test -f "Jellyfin.Plugin.JellyfinEnhanced/bin/Release/${{ matrix.target.tfm }}/Jellyfin.Plugin.JellyfinEnhanced.dll"

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.x

      - name: Test
        run: dotnet test Jellyfin.Plugin.JellyfinEnhanced.Tests/JellyfinEnhanced.Tests.csproj -c Release --logger "console;verbosity=normal"

  client-scripts:
    name: Client scripts (lint + syntax + types)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dev dependencies
        run: npm ci

      - name: Syntax check (node --check, every served file)
        run: npm run syntax

      - name: ESLint
        run: npm run lint

      - name: Type check (opt-in @ts-check files)
        run: npm run typecheck

      # Builds dist/je.bundle.js the same way the csproj BuildClientBundle target
      # does on every dotnet build — catches bundle breakage (a bad entry in
      # allComponentScripts, an esbuild-incompatible construct) at PR time.
      - name: Client bundle (esbuild)
        run: npm run build:bundle

  manifest:
    name: Manifest validation
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      # The committed manifest.json is the plugin catalog every install polls
      # for updates — a malformed entry bricks in-app updates for all users.
      # No dependencies needed; the validator is a self-contained Node script.
      - name: Validate manifest.json
        run: node scripts/release/validate-manifest.js manifest.json
