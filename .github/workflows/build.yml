name: Build & Test

# The quality gate for every change: the plugin must compile (Jellyfin 12 /
# net10.0), unit tests must pass, and the client scripts must parse and lint
# cleanly. Before this workflow a PR could break compilation and still merge
# green.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-plugin:
    name: Plugin (Jellyfin 12 / net10.0)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.x

      - name: Build (Release)
        run: dotnet build Jellyfin.Plugin.JellyfinEnhanced/JellyfinEnhanced.csproj -c Release

      - name: Assert DLL produced
        run: test -f "Jellyfin.Plugin.JellyfinEnhanced/bin/Release/net10.0/Jellyfin.Plugin.JellyfinEnhanced.dll"

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.x

      - name: Test
        run: dotnet test Jellyfin.Plugin.JellyfinEnhanced.Tests/JellyfinEnhanced.Tests.csproj -c Release --logger "console;verbosity=normal"

      # Line-coverage ratchet over the plugin assembly (coverlet.collector).
      # The threshold lives in scripts/check-dotnet-coverage.js — set just
      # below the measured coverage when introduced; raise it as coverage
      # grows, never lower it.
      - name: Coverage (plugin assembly line-coverage ratchet)
        run: |
          dotnet test Jellyfin.Plugin.JellyfinEnhanced.Tests/JellyfinEnhanced.Tests.csproj -c Release --collect:"XPlat Code Coverage"
          node scripts/check-dotnet-coverage.js

  client-scripts:
    name: Client scripts (lint + syntax + types)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dev dependencies
        run: npm ci

      - name: Syntax check (node --check, every served file)
        run: npm run syntax

      - name: ESLint
        run: npm run lint

      - name: Type check (opt-in @ts-check files)
        run: npm run typecheck

      # Builds dist/je.bundle.js the same way the csproj BuildClientBundle target
      # does on every dotnet build — catches bundle breakage (a bad entry in
      # allComponentScripts, an esbuild-incompatible construct) at PR time.
      - name: Client bundle (esbuild)
        run: npm run build:bundle

      # TypeScript module tree (src/): strict type check + unit tests.
      - name: Type check (src TypeScript modules, strict)
        run: npm run typecheck:src

      - name: Client unit tests (vitest)
        run: npm run test:client

      # Line-coverage ratchet over src/core/ (the typed platform layer).
      # The threshold lives in vitest.config.ts — set just below the measured
      # coverage when introduced; raise it as coverage grows, never lower it.
      - name: Client coverage gate (src/core)
        run: npm run test:client:coverage

  # Real-browser verification against a dockerized, freshly seeded Jellyfin 12
  # (e2e/docker/): boot, tags, panel, navigation survival, live updates and the
  # admin authz matrix, straight from the committed Playwright suite.
  #
  # NEW INFRASTRUCTURE — continue-on-error keeps this job advisory while it
  # earns trust (media generation + first-boot seeding + real-browser playback
  # have more moving parts than the other jobs). Once it has proven reliable
  # across a stretch of PRs, drop the continue-on-error line to make it a
  # required check.
  e2e:
    name: E2E (dockerized Jellyfin 12)
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.x

      - name: Build plugin (Release)
        run: dotnet build Jellyfin.Plugin.JellyfinEnhanced/JellyfinEnhanced.csproj -c Release

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dev dependencies
        run: npm ci

      # @playwright/test is an optional peer dependency (local runs resolve the
      # globally installed `playwright` instead) — CI installs it explicitly,
      # plus its browser.
      - name: Install Playwright
        run: |
          npm install --no-save @playwright/test@^1.58.0
          npx playwright install --with-deps chromium

      # Generates tiny ffmpeg test movies, boots jellyfin:12 with the freshly
      # built plugin DLL, completes the startup wizard, creates the library +
      # test users and waits for the scan (see e2e/docker/seed.sh).
      - name: Seed dockerized Jellyfin
        run: bash e2e/docker/seed.sh
        env:
          JF_PORT: "8100"

      - name: Run E2E suite
        run: npm run e2e
        env:
          JF_BASE_URL: http://localhost:8100

      - name: Server logs on failure
        if: failure()
        run: docker logs je-e2e-jellyfin --tail 200 || true

      - name: Upload traces and screenshots on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-test-results
          path: e2e/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose -f e2e/docker/compose.yml down -v || true

  manifest:
    name: Manifest validation
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      # The committed manifest.json is the plugin catalog every install polls
      # for updates — a malformed entry bricks in-app updates for all users.
      # No dependencies needed; the validator is a self-contained Node script.
      - name: Validate manifest.json
        run: node scripts/release/validate-manifest.js manifest.json
