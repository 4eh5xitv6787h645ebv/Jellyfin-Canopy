name: Build & Test

# The blocking quality gate for every change: the plugin must compile (Jellyfin
# 12 / net10.0), unit/script tests, types, coverage, builds, and contracts must
# pass, and ESLint always reports as an advisory signal. A broken lint
# invocation/configuration still blocks. The E2E job has its own documented
# temporary advisory policy below.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-plugin:
    name: Plugin (Jellyfin 12 / net10.0)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.x

      - name: Build (Release)
        run: dotnet build Jellyfin.Plugin.JellyfinCanopy/JellyfinCanopy.csproj -c Release

      - name: Assert DLL produced
        run: test -f "Jellyfin.Plugin.JellyfinCanopy/bin/Release/net10.0/Jellyfin.Plugin.JellyfinCanopy.dll"

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.x

      - name: Test
        run: dotnet test Jellyfin.Plugin.JellyfinCanopy.Tests/JellyfinCanopy.Tests.csproj -c Release --logger "console;verbosity=normal"

      # Line-coverage ratchet over the plugin assembly (coverlet.collector).
      # The threshold lives in scripts/check-dotnet-coverage.js — set just
      # below the measured coverage when introduced; raise it as coverage
      # grows, never lower it.
      - name: Coverage (plugin assembly line-coverage ratchet)
        run: |
          dotnet test Jellyfin.Plugin.JellyfinCanopy.Tests/JellyfinCanopy.Tests.csproj -c Release --collect:"XPlat Code Coverage"
          node scripts/check-dotnet-coverage.js

  client-scripts:
    name: Client checks (lint advisory; all other gates blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dev dependencies
        run: npm ci

      - name: Syntax check (node --check, every served file)
        run: npm run syntax

      - name: ESLint (advisory — reported in summary)
        run: ./verify.sh lint

      - name: Script unit tests (translation validator hardening)
        run: npm run test:scripts

      - name: Type check (opt-in @ts-check files)
        run: npm run typecheck

      # Builds dist/jc.bundle.js the same way the csproj BuildClientBundle target
      # does on every dotnet build — catches bundle breakage (a bad entry in
      # allComponentScripts, an esbuild-incompatible construct) at PR time.
      - name: Client bundle (esbuild)
        run: npm run build:bundle

      # TypeScript module tree (src/): strict type check + unit tests.
      - name: Type check (src TypeScript modules, strict)
        run: npm run typecheck:src

      - name: Client unit tests (vitest)
        run: npm run test:client

      # Line-coverage ratchet over src/core/ (the typed platform layer).
      # The threshold lives in vitest.config.ts — set just below the measured
      # coverage when introduced; raise it as coverage grows, never lower it.
      - name: Client coverage gate (src/core)
        run: npm run test:client:coverage

  # Real-browser verification against a dockerized, freshly seeded Jellyfin 12
  # (e2e/docker/): boot, tags, panel, navigation survival, live updates and the
  # admin authz matrix, straight from the committed Playwright suite.
  #
  # Each shard owns a fresh Jellyfin server. Specs remain serial within that
  # server; only independent seeded environments run concurrently. The stable
  # aggregate job below preserves the existing check name and rejects missing,
  # stale, or failed shard markers.
  #
  # NEW INFRASTRUCTURE — continue-on-error keeps the shard and aggregate jobs
  # advisory while this lane earns trust. Once it has proven reliable, remove
  # both continue-on-error lines and require only the stable aggregate check.
  e2e_shard:
    name: E2E shard ${{ matrix.shard }}/4 (dockerized Jellyfin 12)
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        shard: [1, 2, 3, 4]
    env:
      JF_PORT: "8100"
      JF_BASE_URL: http://localhost:8100
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.x

      - name: Build plugin (Release)
        run: dotnet build Jellyfin.Plugin.JellyfinCanopy/JellyfinCanopy.csproj -c Release

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dev dependencies
        run: npm ci

      # @playwright/test is an optional peer dependency (local runs resolve the
      # globally installed `playwright` instead) — CI installs it explicitly,
      # plus its browser.
      - name: Install Playwright
        run: |
          npm install --no-save @playwright/test@^1.58.0
          npx playwright install --with-deps chromium

      # Generates tiny ffmpeg test movies, boots jellyfin:12 with the freshly
      # built plugin DLL, completes the startup wizard, creates the library +
      # test users and waits for the scan (see e2e/docker/seed.sh).
      - name: Seed dockerized Jellyfin
        id: seed
        run: bash e2e/docker/seed.sh

      - name: Run E2E shard ${{ matrix.shard }}/4
        id: playwright
        timeout-minutes: 15
        run: npm run e2e -- --shard=${{ matrix.shard }}/4

      - name: Server logs on failure
        if: always() && (steps.seed.outcome != 'success' || steps.playwright.outcome != 'success')
        run: docker logs jc-e2e-jellyfin --tail 200 || true

      - name: Upload traces and screenshots on failure
        if: always() && steps.playwright.outcome != 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-test-results-${{ github.run_id }}-${{ github.run_attempt }}-shard-${{ matrix.shard }}-of-4
          path: e2e/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose -f e2e/docker/compose.yml down -v || true

      - name: Record shard result
        if: always()
        env:
          SEED_OUTCOME: ${{ steps.seed.outcome }}
          TEST_OUTCOME: ${{ steps.playwright.outcome }}
        run: |
          node scripts/e2e/shard-result.js write \
            --output "${RUNNER_TEMP}/jc-e2e-shard-results/shard-${{ matrix.shard }}.json" \
            --shard "${{ matrix.shard }}" \
            --total 4 \
            --sha "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --seed-outcome "${SEED_OUTCOME:-skipped}" \
            --test-outcome "${TEST_OUTCOME:-skipped}"

      - name: Upload shard result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-status-${{ github.run_id }}-${{ github.run_attempt }}-shard-${{ matrix.shard }}-of-4
          path: ${{ runner.temp }}/jc-e2e-shard-results/shard-${{ matrix.shard }}.json
          retention-days: 7
          if-no-files-found: error

  e2e:
    name: E2E (dockerized Jellyfin 12)
    needs: e2e_shard
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Download current-attempt shard results
        id: download
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: e2e-status-${{ github.run_id }}-${{ github.run_attempt }}-shard-*-of-4
          path: ${{ runner.temp }}/jc-e2e-shard-results
          merge-multiple: true

      - name: Require shard artifact download
        if: always()
        env:
          DOWNLOAD_OUTCOME: ${{ steps.download.outcome }}
        run: test "${DOWNLOAD_OUTCOME}" = success

      - name: Aggregate shard results
        if: always()
        run: |
          node scripts/e2e/shard-result.js aggregate \
            --directory "${RUNNER_TEMP}/jc-e2e-shard-results" \
            --total 4 \
            --sha "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"

  manifest:
    name: Manifest validation
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      # The committed manifest.json is the plugin catalog every install polls
      # for updates — a malformed entry bricks in-app updates for all users.
      # No dependencies needed; the validator is a self-contained Node script.
      - name: Validate manifest.json
        run: node scripts/release/validate-manifest.js manifest.json
# Registered for Jellyfin Canopy CI (no functional change).
