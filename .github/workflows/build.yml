name: Build & Test

# The blocking quality gate for every change: the plugin must compile (Jellyfin
# 12 / net10.0), unit/script tests, types, coverage, builds, and contracts must
# pass, and ESLint always reports as an advisory signal. A broken lint
# invocation/configuration still blocks. Required E2E is also blocking and is
# reused by release.yml for the exact tag source SHA.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

# GitHub expressions cannot derive a matrix axis from workflow `env`, so the
# shard job declares the same total once as its one-value `matrix.total` axis.
# Every shard coordinate/artifact derives from that axis; the aggregate derives
# from this workflow-wide value.
env:
  E2E_SHARD_TOTAL: "6"

jobs:
  build-plugin:
    name: Plugin (Jellyfin 12 / net10.0)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify Node toolchain
        run: npm run check:toolchain

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.x

      - name: Build (Release)
        run: dotnet build Jellyfin.Plugin.JellyfinCanopy/JellyfinCanopy.csproj -c Release

      - name: Assert DLL produced
        run: test -f "Jellyfin.Plugin.JellyfinCanopy/bin/Release/net10.0/Jellyfin.Plugin.JellyfinCanopy.dll"

      - name: Record independently built bundle bytes
        run: node scripts/bundle-manifest.js write "${RUNNER_TEMP}/build-plugin-bundle.json"

      - name: Upload bundle-byte evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-plugin-bundle-${{ github.run_id }}
          path: ${{ runner.temp }}/build-plugin-bundle.json
          if-no-files-found: error
          retention-days: 7
          overwrite: true

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify Node toolchain
        run: npm run check:toolchain

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.x

      # Line-coverage ratchet over the plugin assembly (coverlet.collector).
      # The threshold and repeated clean measurement live in the shared
      # scripts/coverage-baselines.json artifact. Scope or coverage growth
      # requires an explicit reviewed ratchet update.
      - name: Unit tests + coverage (plugin assembly line-coverage ratchet)
        run: npm run test:server:coverage

  client-scripts:
    name: Client checks (lint advisory; all other gates blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify Node toolchain
        run: npm run check:toolchain

      - name: Install dev dependencies
        run: npm ci

      - name: Syntax check (node --check, every served file)
        run: npm run syntax

      - name: ESLint (advisory — reported in summary)
        run: ./verify.sh lint

      - name: Script unit tests (translation validator hardening)
        run: npm run test:scripts

      - name: Type check (opt-in @ts-check files)
        run: npm run typecheck

      # Builds dist/jc.bundle.js the same way the csproj BuildClientBundle target
      # does on every dotnet build — catches bundle breakage (a bad entry in
      # allComponentScripts, an esbuild-incompatible construct) at PR time.
      - name: Client bundle (esbuild)
        run: npm run build:bundle

      # TypeScript module tree (src/): strict type check + unit tests.
      - name: Type check (src TypeScript modules, strict)
        run: npm run typecheck:src

      # Line-coverage ratchet over src/core/ (the typed platform layer).
      # The threshold and repeated clean measurement live in the same shared
      # scripts/coverage-baselines.json artifact as the server gate.
      - name: Client unit tests + coverage gate (src/core)
        run: npm run test:client:coverage

      - name: Record independently built client bundle bytes
        run: node scripts/bundle-manifest.js write "${RUNNER_TEMP}/client-scripts-bundle.json"

      - name: Upload client bundle-byte evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: client-scripts-bundle-${{ github.run_id }}
          path: ${{ runner.temp }}/client-scripts-bundle.json
          if-no-files-found: error
          retention-days: 7
          overwrite: true

  bundle-equivalence:
    name: Bundle reproducibility
    needs: [build-plugin, client-scripts]
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Verify Node toolchain
        run: npm run check:toolchain

      - name: Download plugin bundle-byte evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-plugin-bundle-${{ github.run_id }}
          path: ${{ runner.temp }}/build-plugin-bundle

      - name: Download client bundle-byte evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: client-scripts-bundle-${{ github.run_id }}
          path: ${{ runner.temp }}/client-scripts-bundle

      - name: Require byte-identical bundles across jobs
        run: >-
          node scripts/bundle-manifest.js compare
          "${RUNNER_TEMP}/build-plugin-bundle/build-plugin-bundle.json"
          "${RUNNER_TEMP}/client-scripts-bundle/client-scripts-bundle.json"

  # Real-browser verification against a dockerized, freshly seeded Jellyfin 12
  # (e2e/docker/): boot, tags, panel, navigation survival, live updates and the
  # admin authz matrix, straight from the committed Playwright suite.
  #
  # Each of the six shards owns a fresh Jellyfin server. Specs remain serial
  # within that server; only independent seeded environments run concurrently.
  # The stable aggregate job below preserves the existing check name and rejects missing,
  # stale, duplicate, or failed shard markers. On a failed-jobs rerun it can
  # reuse successful markers from prior attempts of the same run and commit.
  #
  # This is a required gate: every shard and the exact aggregate inventory are
  # blocking on pull requests, main pushes, and reusable release calls.
  e2e_shard:
    name: E2E shard ${{ matrix.shard }}/${{ matrix.total }} (dockerized Jellyfin 12)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
        # One-value axis centralizes the total for every matrix-job expression.
        total: [6]
    env:
      JF_PORT: "8100"
      JF_BASE_URL: http://127.0.0.1:8100
      JF_CPUS: "2"
      JF_IMAGE: jellyfin/jellyfin:unstable@sha256:9040e988eca1e53cd90679d16edf7bd842cc661bf85da124431e25452b4abeb5
      JF_MOCK_IMAGE: node:22-alpine@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify Node toolchain
        run: npm run check:toolchain

      - name: Install dev dependencies
        run: npm ci

      # The plugin build, pinned Jellyfin image pull, and headless Chromium
      # preparation are independent once npm ci has completed. Run them together
      # and wait for every process so one failure can never be hidden by another.
      - name: Prepare plugin, Jellyfin image and Playwright
        run: |
          prepare_dir="${RUNNER_TEMP}/jc-e2e-prepare"
          mkdir -p "${prepare_dir}"

          dotnet build Jellyfin.Plugin.JellyfinCanopy/JellyfinCanopy.csproj -c Release \
            > "${prepare_dir}/plugin-build.log" 2>&1 &
          build_pid=$!
          docker pull -q "${JF_IMAGE}" > "${prepare_dir}/jellyfin-pull.log" 2>&1 &
          image_pid=$!
          npx playwright install --with-deps --only-shell chromium \
            > "${prepare_dir}/playwright-install.log" 2>&1 &
          playwright_pid=$!

          build_status=0
          image_status=0
          playwright_status=0
          wait "${build_pid}" || build_status=$?
          wait "${image_pid}" || image_status=$?
          wait "${playwright_pid}" || playwright_status=$?

          for log_file in plugin-build jellyfin-pull playwright-install; do
            echo "::group::${log_file}"
            cat "${prepare_dir}/${log_file}.log"
            echo "::endgroup::"
          done

          if (( build_status != 0 || image_status != 0 || playwright_status != 0 )); then
            echo "Preparation failed: build=${build_status}, image=${image_status}, playwright=${playwright_status}" >&2
            exit 1
          fi

      # Generates tiny ffmpeg test movies, boots jellyfin:12 with the freshly
      # built plugin DLL, completes the startup wizard, creates the library +
      # test users and waits for the scan (see e2e/docker/seed.sh).
      - name: Seed dockerized Jellyfin
        id: seed
        env:
          # The preparation step already pulled this exact job-level JF_IMAGE.
          JF_E2E_IMAGE_PREFETCHED: "true"
        run: bash e2e/docker/seed.sh

      - name: Run E2E shard ${{ matrix.shard }}/${{ matrix.total }}
        id: playwright
        timeout-minutes: 15
        env:
          JF_E2E_REQUIRED: "true"
          JF_E2E_INVENTORY_FILE: ${{ runner.temp }}/jc-e2e-shard-results/shard-${{ matrix.shard }}.inventory
          JF_E2E_SHARD: ${{ matrix.shard }}
          JF_E2E_SHARD_TOTAL: ${{ matrix.total }}
          JF_E2E_HEAD_SHA: ${{ github.sha }}
          JF_E2E_RUN_ID: ${{ github.run_id }}
          JF_E2E_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          date -u +'%Y-%m-%dT%H:%M:%SZ' > "${RUNNER_TEMP}/jc-e2e-playwright-started-at"
          npm run e2e -- --shard=${{ matrix.shard }}/${{ matrix.total }}

      - name: Sanitized server logs on failure
        if: always() && (steps.seed.outcome != 'success' || steps.playwright.outcome != 'success')
        run: |
          log_args=(logs --no-color)
          started_at_file="${RUNNER_TEMP}/jc-e2e-playwright-started-at"
          if [[ -s "${started_at_file}" ]]; then
            started_at="$(<"${started_at_file}")"
            if [[ "${started_at}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$ ]]; then
              log_args+=(--since "${started_at}")
            else
              log_args+=(--tail 200)
            fi
          else
            log_args+=(--tail 200)
          fi
          docker compose -f e2e/docker/compose.yml "${log_args[@]}" jellyfin 2>&1 \
            | node scripts/e2e/sanitize-jellyfin-log.js || true

      - name: Upload traces and screenshots on failure
        if: always() && steps.playwright.outcome != 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-test-results-${{ github.run_id }}-${{ github.run_attempt }}-shard-${{ matrix.shard }}-of-${{ matrix.total }}
          path: e2e/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose -f e2e/docker/compose.yml down -v || true

      - name: Record shard result
        if: always()
        env:
          SEED_OUTCOME: ${{ steps.seed.outcome }}
          TEST_OUTCOME: ${{ steps.playwright.outcome }}
        run: |
          node scripts/e2e/shard-result.js write \
            --output "${RUNNER_TEMP}/jc-e2e-shard-results/shard-${{ matrix.shard }}.json" \
            --shard "${{ matrix.shard }}" \
            --total "${{ matrix.total }}" \
            --sha "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --seed-outcome "${SEED_OUTCOME:-skipped}" \
            --test-outcome "${TEST_OUTCOME:-skipped}"

      - name: Upload shard result
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-status-${{ github.run_id }}-${{ github.run_attempt }}-shard-${{ matrix.shard }}-of-${{ matrix.total }}
          path: |
            ${{ runner.temp }}/jc-e2e-shard-results/shard-${{ matrix.shard }}.json
            ${{ runner.temp }}/jc-e2e-shard-results/shard-${{ matrix.shard }}.inventory
          # Match GitHub's 30-day workflow rerun window so a failed-jobs rerun
          # can still reuse untouched successful shard evidence.
          retention-days: 30
          if-no-files-found: error

  e2e:
    name: E2E (dockerized Jellyfin 12)
    needs: [e2e_shard, bundle-equivalence]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Verify Node toolchain
        run: npm run check:toolchain

      - name: Download same-run shard results
        id: download
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # Force the run-scoped REST listing so a partial rerun can see marker
          # artifacts retained from prior attempts of this same workflow run.
          github-token: ${{ github.token }}
          run-id: ${{ github.run_id }}
          pattern: e2e-status-${{ github.run_id }}-*-shard-*-of-${{ env.E2E_SHARD_TOTAL }}
          path: ${{ runner.temp }}/jc-e2e-shard-results
          # Each attempt reuses shard-N.json; separate artifact directories
          # prevent prior and current attempts from overwriting one another.
          merge-multiple: false

      - name: Require shard artifact download
        if: always()
        env:
          DOWNLOAD_OUTCOME: ${{ steps.download.outcome }}
        run: test "${DOWNLOAD_OUTCOME}" = success

      - name: Require reproducible client bundle
        if: always()
        env:
          BUNDLE_EQUIVALENCE_RESULT: ${{ needs.bundle-equivalence.result }}
        run: test "${BUNDLE_EQUIVALENCE_RESULT}" = success

      - name: Aggregate shard results
        if: always()
        run: |
          marker_status=0
          inventory_status=0
          node scripts/e2e/shard-result.js aggregate \
            --directory "${RUNNER_TEMP}/jc-e2e-shard-results" \
            --total "${E2E_SHARD_TOTAL}" \
            --sha "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" || marker_status=$?
          node scripts/e2e/required-inventory.js aggregate \
            --directory "${RUNNER_TEMP}/jc-e2e-shard-results" \
            --expected e2e/required-test-inventory.json \
            --total "${E2E_SHARD_TOTAL}" \
            --sha "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" || inventory_status=$?
          (( marker_status == 0 && inventory_status == 0 ))

  manifest:
    name: Manifest validation
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Verify Node toolchain
        run: npm run check:toolchain

      # The committed manifest.json is the plugin catalog every install polls
      # for updates — a malformed entry bricks in-app updates for all users.
      # No dependencies needed; the validator is a self-contained Node script.
      - name: Validate manifest.json
        run: node scripts/release/validate-manifest.js manifest.json

      # Syntax and checksum shape are not enough: Jellyfin has no GitHub
      # credentials, so each new or changed asset must work anonymously.
      # Frozen history stays out of unrelated PRs' live-network dependency.
      - name: Verify public catalog and release assets
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          args=(
            manifest.json
            --manifest-url
            https://raw.githubusercontent.com/4eh5xitv6787h645ebv/Jellyfin-Canopy/main/manifest.json
          )
          if [[ "$BASE_SHA" =~ ^[0-9a-f]{40}$ ]] \
              && git cat-file -e "${BASE_SHA}:manifest.json" 2>/dev/null; then
            git show "${BASE_SHA}:manifest.json" > "$RUNNER_TEMP/base-manifest.json"
            args+=(--base-manifest "$RUNNER_TEMP/base-manifest.json")
          fi
          node scripts/release/verify-manifest-remote.js "${args[@]}"
