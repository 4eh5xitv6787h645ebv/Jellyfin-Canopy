name: Release

# Tag-triggered release automation. Replaces the manual process where ZIPs
# were built by hand and manifest.json (the plugin-repo manifest every
# installed copy polls for updates — a mistake there bricks in-app updates)
# was hand-edited.
#
# Push a version tag (existing convention: bare "12.0.0.0"; "v12.0.0" also
# works) and this workflow:
#   1. runs the full quality gates (plugin build, unit tests,
#      JS syntax/lint/type checks) — any failure aborts the release,
#   2. stamps the assembly with the tag version (no version-churn commits),
#   3. packages the Jellyfin 12 ZIP with the DLL at the zip root
#      (Jellyfin.Plugin.JellyfinEnhanced_12.0.0.zip — the exact layout and
#      naming of the existing release assets),
#   4. creates the GitHub Release (or attaches assets to a pre-drafted one,
#      reusing its body as the changelog),
#   5. regenerates manifest.json via scripts/release/update-manifest.js
#      (MD5 checksums from the real ZIPs, monotonic version guard) and opens
#      a PR with the change — manifest.json is never pushed directly.
#
# New releases publish only targetAbi 12.0.0.0 manifest entries; the
# existing 10.11.0.0 entries in manifest.json are frozen history that keeps
# serving the final 10.11-compatible release line.
#
# Note: because the PR is opened with the built-in GITHUB_TOKEN, GitHub does
# not trigger the Build & Test workflow on it. The manifest is fully
# validated here before the PR is opened; re-run checks manually if needed.

on:
  push:
    tags:
      - 'v[0-9]*'
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, test, package & publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + push the manifest branch
      pull-requests: write # open the manifest-update PR
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0 # full history: changelog + previous-tag detection

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      # $GITHUB_REF_NAME is used via the environment everywhere below —
      # never interpolated into scripts — so a crafted ref cannot inject
      # commands. This step also rejects anything that is not a version tag.
      - name: Derive version from tag
        id: version
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' is not a release version tag (expected 11.13.0.0 or v11.13.0)"
            exit 1
          fi
          bare="${GITHUB_REF_NAME#v}"
          IFS='.' read -ra parts <<< "$bare"
          while [ "${#parts[@]}" -lt 4 ]; do parts+=("0"); done
          version="$(IFS='.'; echo "${parts[*]}")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing version $version from tag $GITHUB_REF_NAME"

      # ---- Quality gates: identical to build.yml, but a failure here ----
      # ---- blocks the release instead of just failing a check.       ----
      - name: Install dev dependencies
        run: npm ci

      - name: Syntax check (node --check, every served file)
        run: npm run syntax

      - name: ESLint
        run: npm run lint

      - name: Script unit tests (translation validator hardening)
        run: npm run test:scripts

      - name: Type check (opt-in @ts-check files)
        run: npm run typecheck

      - name: Type check (src TypeScript modules, strict)
        run: npm run typecheck:src

      - name: Client unit tests (vitest)
        run: npm run test:client

      - name: Client bundle (esbuild)
        run: npm run build:bundle

      - name: Unit tests
        run: dotnet test Jellyfin.Plugin.JellyfinEnhanced.Tests/JellyfinEnhanced.Tests.csproj -c Release --logger "console;verbosity=normal"

      - name: Validate current manifest
        run: node scripts/release/validate-manifest.js manifest.json

      # ---- Build & package. The tag is the single source of truth for ----
      # ---- the version: it is stamped into the assemblies at build    ----
      # ---- time, never committed back into the csproj.                ----
      - name: Build & package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          # Jellyfin 12 / net10.0
          dotnet build Jellyfin.Plugin.JellyfinEnhanced/JellyfinEnhanced.csproj \
            -c Release \
            -p:AssemblyVersion="$VERSION" -p:FileVersion="$VERSION"
          # Existing release-asset layout: exactly one file, the plugin DLL
          # at the zip root, named after the targetAbi.
          zip -j dist/Jellyfin.Plugin.JellyfinEnhanced_12.0.0.zip \
            Jellyfin.Plugin.JellyfinEnhanced/bin/Release/net10.0/Jellyfin.Plugin.JellyfinEnhanced.dll
          ls -l dist/

      # Changelog precedence: a pre-drafted release body for this tag wins;
      # otherwise commit subjects since the previous tag, in the same
      # "- first\n - second" shape the manifest has always used. The text is
      # only ever passed around as a file — never through the shell.
      - name: Collect changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --json body --jq .body > changelog.txt 2>/dev/null \
              && [ -s changelog.txt ]; then
            echo "Using existing release body as changelog"
          else
            prev_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
            if [ -n "$prev_tag" ]; then
              range="${prev_tag}..${GITHUB_REF_NAME}"
              echo "Changelog from commits in $range"
            else
              range="$GITHUB_REF_NAME"
              echo "No previous tag found; changelog from all commits"
            fi
            git log --no-merges --pretty='%s' "$range" \
              | awk 'NR==1 { print "- " $0; next } { print " - " $0 }' > changelog.txt
          fi
          if [ ! -s changelog.txt ]; then
            echo "::error::Changelog is empty"
            exit 1
          fi

      - name: Update manifest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/release/update-manifest.js \
            --manifest manifest.json \
            --tag "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --changelog-file changelog.txt \
            --asset "12.0.0.0=dist/Jellyfin.Plugin.JellyfinEnhanced_12.0.0.zip" > new-entries.json
          node scripts/release/validate-manifest.js manifest.json --assets-dir dist
          {
            echo '### New manifest entries'
            echo '````json'
            cat new-entries.json
            echo '````'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create release & attach ZIPs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            echo "Release for $GITHUB_REF_NAME already exists; attaching assets"
            gh release upload "$GITHUB_REF_NAME" dist/*.zip --clobber
            # A pre-drafted release stays a DRAFT after upload, and draft assets
            # are not served at releases/download/<tag>/... — the URL the
            # manifest entry points at. Publish it, or every install polling
            # the merged manifest would hit a 404.
            gh release edit "$GITHUB_REF_NAME" --draft=false
          else
            gh release create "$GITHUB_REF_NAME" dist/*.zip \
              --verify-tag \
              --title "v$VERSION" \
              --notes-file changelog.txt
          fi

      # The manifest lands via PR, not a direct push: a human reviews the
      # generated entry before every installed plugin starts seeing it.
      - name: Open manifest update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          branch="release/manifest-$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add manifest.json
          git commit -m "chore: update manifest for $VERSION"
          git push --force origin "$branch"
          default_branch="$(gh repo view --json defaultBranchRef --jq .defaultBranchRef.name)"
          release_url="https://github.com/$GITHUB_REPOSITORY/releases/tag/$GITHUB_REF_NAME"
          {
            echo "Automated manifest update for release [$GITHUB_REF_NAME]($release_url)."
            echo
            echo "Generated by the Release workflow: checksums are MD5 of the uploaded"
            echo "ZIPs, the version comes from the git tag, and the result passed"
            echo '`scripts/release/validate-manifest.js`.'
            echo
            echo "Merging this PR is what publishes the update to installed plugins."
          } > pr-body.md
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --base "$default_branch" \
              --head "$branch" \
              --title "chore: update manifest for $VERSION" \
              --body-file pr-body.md
          else
            echo "PR for $branch already open; branch updated"
          fi
