name: Release

# Tag-triggered release automation. Replaces the manual process where ZIPs
# were built by hand and manifest.json (the plugin-repo manifest every
# installed copy polls for updates — a mistake there bricks in-app updates)
# was hand-edited.
#
# Push the next Canopy plugin-version tag (for example "2.0.1.0"; "v2.0.1"
# also works) and this workflow:
#   1. runs the full quality gates (plugin build, unit tests, JS syntax/type
#      checks) and reports ESLint findings/cap breaches as advisory; every
#      non-lint failure and any broken lint invocation aborts the release,
#   2. stamps the assembly with the tag version (no version-churn commits),
#   3. packages the Jellyfin 12 ZIP with the DLL at the zip root
#      (Jellyfin.Plugin.JellyfinCanopy_12.0.0.zip — the exact layout and
#      naming of the existing release assets),
#   4. creates or resumes an unadvertised draft and finalizes its immutable
#      asset; an already-published tag is verified and never modified,
#   5. generates a create-only manifest branch from the downloaded final ZIP,
#      publishes the draft, proves the exact bytes anonymously downloadable,
#      and opens the manifest PR. A valid rerun is a verified no-op; neither
#      release bytes/notes nor reviewer commits are overwritten.
#
# New releases publish only targetAbi 12.0.0.0 manifest entries. This catalog
# has no Jellyfin 10.11-compatible stream.
#
# Note: because the PR is opened with the built-in GITHUB_TOKEN, GitHub does
# not trigger the Build & Test workflow on it. The manifest is fully
# validated here before the PR is opened; re-run checks manually if needed.

on:
  push:
    tags:
      - 'v[0-9]*'
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  provenance:
    name: Verify release source provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag_sha: ${{ steps.provenance.outputs.tag_sha }}
      default_branch: ${{ steps.provenance.outputs.default_branch }}
      default_sha: ${{ steps.provenance.outputs.default_sha }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Verify Node toolchain
        run: node scripts/check-node-toolchain.js

      - name: Validate plugin version and Jellyfin ABI policy
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: >-
          node scripts/release/version-policy.js
          --tag "${RELEASE_TAG}"
          --manifest manifest.json
          --project Jellyfin.Plugin.JellyfinCanopy/JellyfinCanopy.csproj

      - name: Fetch reviewed default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: git fetch --no-tags origin "+refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"

      - name: Require tag commit on reviewed default-branch history
        id: provenance
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_SHA: ${{ github.sha }}
        run: >-
          node scripts/release/verify-provenance.js
          --tag-ref "${EVENT_SHA}"
          --default-ref "refs/remotes/origin/${DEFAULT_BRANCH}"
          --default-branch "${DEFAULT_BRANCH}"
          --github-output "${GITHUB_OUTPUT}"
          --summary "${GITHUB_STEP_SUMMARY}"

  quality-gates:
    name: Required source-SHA quality gates
    needs: provenance
    uses: ./.github/workflows/build.yml
    permissions:
      actions: read
      contents: read

  security-gates:
    name: Required source-SHA security gates
    needs: provenance
    uses: ./.github/workflows/security-scan.yml
    with:
      verify_repository_policy: true
    permissions:
      # The called policy-verifier job needs write-level repository identity
      # so GitHub returns bypass actors; its other jobs stay contents:read.
      contents: write

  release:
    name: Build, test, package & publish
    needs: [provenance, quality-gates, security-gates]
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      actions: write # dispatch required checks for the generated manifest PR
      contents: write # create the release + push the manifest branch
      pull-requests: write # open the manifest-update PR
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          egress-policy: audit

      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0 # full history: changelog + previous-tag detection

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify Node toolchain
        run: npm run check:toolchain

      # Keep the plugin version and Jellyfin target ABI as separate outputs.
      # The same policy already ran in the provenance job, before the reusable
      # quality gates and protected release environment.
      - name: Derive version from tag
        id: version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: >-
          node scripts/release/version-policy.js
          --tag "${RELEASE_TAG}"
          --manifest manifest.json
          --project Jellyfin.Plugin.JellyfinCanopy/JellyfinCanopy.csproj
          --github-output "${GITHUB_OUTPUT}"

      - name: Record approved source provenance
        env:
          TAG_SHA: ${{ needs.provenance.outputs.tag_sha }}
          DEFAULT_BRANCH: ${{ needs.provenance.outputs.default_branch }}
          DEFAULT_SHA: ${{ needs.provenance.outputs.default_sha }}
          QUALITY_RESULT: ${{ needs.quality-gates.result }}
          SECURITY_RESULT: ${{ needs.security-gates.result }}
        run: |
          {
            echo '### Approved release provenance'
            echo "- Tag commit: \`${TAG_SHA}\`"
            echo "- Reviewed branch: \`${DEFAULT_BRANCH}\` at \`${DEFAULT_SHA}\`"
            echo "- Default-branch ancestry: verified"
            echo "- Required Build & Test workflow: \`${QUALITY_RESULT}\`"
            echo "- Required Security Scan workflow: \`${SECURITY_RESULT}\`"
            echo "- Protected environment: \`release\` (explicit approval recorded by GitHub)"
          } >> "$GITHUB_STEP_SUMMARY"

      # ---- Quality policy mirrors build.yml: lint findings are advisory; ----
      # ---- every other failure (including broken lint tooling) blocks.  ----
      - name: Install dev dependencies
        run: npm ci

      - name: Syntax check (node --check, every served file)
        run: npm run syntax

      - name: ESLint (advisory — reported in summary)
        run: ./verify.sh lint

      - name: Script unit tests (translation validator hardening)
        run: npm run test:scripts

      - name: Type check (opt-in @ts-check files)
        run: npm run typecheck

      - name: Type check (src TypeScript modules, strict)
        run: npm run typecheck:src

      - name: Client unit tests (vitest)
        run: npm run test:client

      - name: Client bundle (esbuild)
        run: npm run build:bundle

      - name: Unit tests
        run: dotnet test Jellyfin.Plugin.JellyfinCanopy.Tests/JellyfinCanopy.Tests.csproj -c Release --logger "console;verbosity=normal"

      - name: Validate current manifest
        run: node scripts/release/validate-manifest.js manifest.json

      - name: Verify current public catalog
        run: >-
          node scripts/release/verify-manifest-remote.js manifest.json
          --manifest-url
          https://raw.githubusercontent.com/4eh5xitv6787h645ebv/Jellyfin-Canopy/main/manifest.json

      # ---- Build & package. The tag is the single source of truth for ----
      # ---- the version: it is stamped into the assemblies at build    ----
      # ---- time, never committed back into the csproj.                ----
      - name: Build & package
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET_ABI: ${{ steps.version.outputs.target_abi }}
        run: |
          mkdir -p dist
          # Jellyfin 12 / net10.0
          dotnet build Jellyfin.Plugin.JellyfinCanopy/JellyfinCanopy.csproj \
            -c Release \
            -p:AssemblyVersion="$VERSION" -p:FileVersion="$VERSION"
          # Existing release-asset layout: exactly one file, the plugin DLL
          # at the zip root, named after the targetAbi.
          dll=Jellyfin.Plugin.JellyfinCanopy/bin/Release/net10.0/Jellyfin.Plugin.JellyfinCanopy.dll
          # Give repeat builds of the same tag stable ZIP metadata. Published
          # bytes are immutable regardless; determinism is diagnostic aid only.
          source_date_epoch="$(git log -1 --format=%ct "refs/tags/$GITHUB_REF_NAME^{commit}")"
          touch -d "@$source_date_epoch" "$dll"
          abi_asset="${TARGET_ABI%.*}"
          TZ=UTC zip -X -j "dist/Jellyfin.Plugin.JellyfinCanopy_${abi_asset}.zip" "$dll"
          ls -l dist/

      # Query the REST collection once so API failures are blocking and so two
      # manual drafts for one tag cannot be mistaken for one resumable release.
      - name: Discover existing release metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --paginate --slurp \
            "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            > "$RUNNER_TEMP/release-pages.json"
          jq --arg tag "$GITHUB_REF_NAME" \
            '[.[][] | select(.tag_name == $tag)]' \
            "$RUNNER_TEMP/release-pages.json" > "$RUNNER_TEMP/tag-releases.json"
          release_count="$(jq length "$RUNNER_TEMP/tag-releases.json")"
          if [ "$release_count" -gt 1 ]; then
            echo "::error::Multiple releases/drafts exist for tag $GITHUB_REF_NAME"
            exit 1
          fi
          if [ "$release_count" -eq 1 ]; then
            jq '.[0] | {
              id,
              isDraft: .draft,
              tagName: .tag_name,
              body,
              assets: [.assets[] | { id, name }]
            }' "$RUNNER_TEMP/tag-releases.json" > "$RUNNER_TEMP/release.json"
          fi

      # Changelog precedence: a pre-drafted release body for this tag wins;
      # otherwise commit subjects since the previous tag, in the same
      # "- first\n - second" shape the manifest has always used. The text is
      # only ever passed around as a file — never through the shell.
      - name: Collect changelog
        run: |
          if [ -f "$RUNNER_TEMP/release.json" ]; then
            jq -r '.body // ""' "$RUNNER_TEMP/release.json" > changelog.txt
          fi
          if [ -s changelog.txt ]; then
            echo "Using existing release body as changelog"
          else
            prev_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
            if [ -n "$prev_tag" ]; then
              range="${prev_tag}..${GITHUB_REF_NAME}"
              echo "Changelog from commits in $range"
            else
              range="$GITHUB_REF_NAME"
              echo "No previous tag found; changelog from all commits"
            fi
            # Neutralize @-mention-shaped tokens (e.g. a commit subject citing
            # "@font-face") by wrapping them in backticks: on the GitHub release
            # page a bare @word renders as a user mention AND credits that user
            # in the release's Contributors section.
            git log --no-merges --pretty='%s' "$range" \
              | sed -E 's/(^|[^`[:alnum:]])@([[:alnum:]][[:alnum:]-]*)/\1`@\2`/g' \
              | awk 'NR==1 { print "- " $0; next } { print " - " $0 }' > changelog.txt
          fi
          if [ ! -s changelog.txt ]; then
            echo "::error::Changelog is empty"
            exit 1
          fi

      # This is the release-state ownership boundary. It downloads any existing
      # asset before choosing an action and fails closed when published bytes do
      # not match main or the create-only proposal branch.
      - name: Inspect release and manifest state
        id: release_state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TARGET_ABI: ${{ steps.version.outputs.target_abi }}
        run: |
          zip_name="Jellyfin.Plugin.JellyfinCanopy_${TARGET_ABI%.*}.zip"
          default_branch="$(gh repo view --json defaultBranchRef --jq .defaultBranchRef.name)"
          branch="release/manifest-$VERSION"

          git fetch origin "$default_branch"
          git show "origin/$default_branch:manifest.json" > "$RUNNER_TEMP/main-manifest.json"

          args=(
            --repo "$GITHUB_REPOSITORY"
            --tag "$GITHUB_REF_NAME"
            --target-abi "$TARGET_ABI"
            --zip-name "$zip_name"
            --built-asset "dist/$zip_name"
            --main-manifest "$RUNNER_TEMP/main-manifest.json"
            --github-output "$GITHUB_OUTPUT"
            --contract-manifest-output "$RUNNER_TEMP/existing-contract.json"
          )

          if git ls-remote --exit-code --heads origin "refs/heads/$branch" > /dev/null; then
            git fetch origin "refs/heads/$branch:refs/remotes/origin/$branch"
            git show "refs/remotes/origin/$branch:manifest.json" \
              > "$RUNNER_TEMP/proposal-manifest.json"
            args+=(--proposal-manifest "$RUNNER_TEMP/proposal-manifest.json")
          fi

          rejected_pr="$(gh pr list --head "$branch" --state closed --limit 100 \
            --json number,mergedAt \
            --jq '[.[] | select(.mergedAt == null) | .number] | join(",")')"
          if [ -n "$rejected_pr" ]; then
            echo "::error::Manifest branch has rejected/closed PR(s) $rejected_pr; refusing release mutation"
            exit 1
          fi

          if [ -f "$RUNNER_TEMP/release.json" ]; then
            args+=(--release-json "$RUNNER_TEMP/release.json")
            asset_count="$(jq --arg name "$zip_name" \
              '[.assets[] | select(.name == $name)] | length' "$RUNNER_TEMP/release.json")"
            if [ "$asset_count" -gt 1 ]; then
              echo "::error::Release contains duplicate $zip_name assets"
              exit 1
            fi
            if [ "$asset_count" -eq 1 ]; then
              mkdir -p "$RUNNER_TEMP/existing-assets"
              gh release download "$GITHUB_REF_NAME" \
                --pattern "$zip_name" --dir "$RUNNER_TEMP/existing-assets"
              args+=(--remote-asset "$RUNNER_TEMP/existing-assets/$zip_name")
            fi
          fi

          node scripts/release/release-state.js "${args[@]}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "default_branch=$default_branch" >> "$GITHUB_OUTPUT"

      - name: Create or reconcile draft release asset
        env:
          ACTION: ${{ steps.release_state.outputs.action }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TARGET_ABI: ${{ steps.version.outputs.target_abi }}
        run: |
          zip_name="Jellyfin.Plugin.JellyfinCanopy_${TARGET_ABI%.*}.zip"
          require_existing_draft() {
            current="$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft)"
            if [ "$current" != true ]; then
              echo "::error::Release is no longer a draft; refusing asset mutation"
              exit 1
            fi
          }
          case "$ACTION" in
            create-draft)
              gh release create "$GITHUB_REF_NAME" "dist/$zip_name" \
                --draft --verify-tag --title "v$VERSION" --notes-file changelog.txt
              ;;
            upload-draft-asset)
              require_existing_draft
              gh release upload "$GITHUB_REF_NAME" "dist/$zip_name"
              ;;
            reuse-draft-asset|resume-draft-proposal)
              echo "Draft already has the verified immutable asset"
              ;;
            replace-draft-asset)
              # The state gate permits this only with no main/proposal contract.
              require_existing_draft
              gh release upload "$GITHUB_REF_NAME" "dist/$zip_name" --clobber
              ;;
            noop-main|resume-published-proposal)
              echo "Published release is immutable; no release mutation"
              ;;
            *)
              echo "::error::Unknown release action: $ACTION"
              exit 1
              ;;
          esac

      - name: Download finalized draft asset
        if: >-
          steps.release_state.outputs.action != 'noop-main' &&
          steps.release_state.outputs.action != 'resume-published-proposal'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_ABI: ${{ steps.version.outputs.target_abi }}
        run: |
          zip_name="Jellyfin.Plugin.JellyfinCanopy_${TARGET_ABI%.*}.zip"
          mkdir -p "$RUNNER_TEMP/final-assets"
          gh release download "$GITHUB_REF_NAME" \
            --pattern "$zip_name" --dir "$RUNNER_TEMP/final-assets"
          test -f "$RUNNER_TEMP/final-assets/$zip_name"

      - name: Generate manifest from finalized immutable bytes
        if: >-
          steps.release_state.outputs.action != 'noop-main' &&
          steps.release_state.outputs.action != 'resume-published-proposal' &&
          steps.release_state.outputs.action != 'resume-draft-proposal'
        env:
          TARGET_ABI: ${{ steps.version.outputs.target_abi }}
        run: |
          zip_name="Jellyfin.Plugin.JellyfinCanopy_${TARGET_ABI%.*}.zip"
          cp "$RUNNER_TEMP/main-manifest.json" "$RUNNER_TEMP/generated-manifest.json"
          node scripts/release/update-manifest.js \
            --manifest "$RUNNER_TEMP/generated-manifest.json" \
            --tag "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --changelog-file changelog.txt \
            --asset "$TARGET_ABI=$RUNNER_TEMP/final-assets/$zip_name" \
            > "$RUNNER_TEMP/new-entries.json"
          node scripts/release/validate-manifest.js \
            "$RUNNER_TEMP/generated-manifest.json" --assets-dir "$RUNNER_TEMP/final-assets"
          {
            echo '### New manifest entries'
            echo '````json'
            cat "$RUNNER_TEMP/new-entries.json"
            echo '````'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create manifest branch without overwriting reviewer commits
        if: >-
          steps.release_state.outputs.action != 'noop-main' &&
          steps.release_state.outputs.action != 'resume-published-proposal' &&
          steps.release_state.outputs.action != 'resume-draft-proposal'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH: ${{ steps.release_state.outputs.branch }}
          DEFAULT_BRANCH: ${{ steps.release_state.outputs.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --create "$BRANCH" "origin/$DEFAULT_BRANCH"
          cp "$RUNNER_TEMP/generated-manifest.json" manifest.json
          git add manifest.json
          git commit -m "chore: update manifest for $VERSION"
          # Create-only push: a concurrent run or reviewer-owned branch wins.
          # There is deliberately no force/lease update of an existing ref.
          git push --force-with-lease="refs/heads/$BRANCH:" \
            origin "HEAD:refs/heads/$BRANCH"

      - name: Publish verified draft
        if: >-
          steps.release_state.outputs.action != 'noop-main' &&
          steps.release_state.outputs.action != 'resume-published-proposal'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.release_state.outputs.branch }}
        run: |
          git ls-remote --exit-code --heads origin "refs/heads/$BRANCH" > /dev/null
          is_draft="$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft)"
          if [ "$is_draft" != true ]; then
            echo "::error::Release changed state after inspection; refusing to mutate it"
            exit 1
          fi
          gh release edit "$GITHUB_REF_NAME" --draft=false

      - name: Verify exact immutable asset anonymously
        env:
          ACTION: ${{ steps.release_state.outputs.action }}
        run: |
          if [[ "$ACTION" == noop-main \
              || "$ACTION" == resume-published-proposal \
              || "$ACTION" == resume-draft-proposal ]]; then
            manifest="$RUNNER_TEMP/existing-contract.json"
            args=("$manifest")
          else
            manifest="$RUNNER_TEMP/generated-manifest.json"
            args=("$manifest" --base-manifest "$RUNNER_TEMP/main-manifest.json")
          fi
          node scripts/release/verify-manifest-remote.js "${args[@]}" \
            --manifest-url \
            https://raw.githubusercontent.com/4eh5xitv6787h645ebv/Jellyfin-Canopy/main/manifest.json

      # The manifest lands via PR, not a direct push: a human reviews the
      # generated entry before every installed plugin starts seeing it.
      - name: Open manifest update PR
        if: steps.release_state.outputs.action != 'noop-main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH: ${{ steps.release_state.outputs.branch }}
          DEFAULT_BRANCH: ${{ steps.release_state.outputs.default_branch }}
        run: |
          git ls-remote --exit-code --heads origin "refs/heads/$BRANCH" > /dev/null
          release_url="https://github.com/$GITHUB_REPOSITORY/releases/tag/$GITHUB_REF_NAME"
          {
            echo "Automated manifest update for release [$GITHUB_REF_NAME]($release_url)."
            echo
            echo "Generated by the Release workflow: checksums are MD5 of the uploaded"
            echo "ZIPs, the version comes from the git tag, and the result passed"
            echo '`scripts/release/validate-manifest.js`.'
            echo
            echo "Merging this PR is what publishes the update to installed plugins."
            echo "If main advances, first update this proposal branch from main. After"
            echo "any proposal-head change, rerun the source Release workflow so it"
            echo "dispatches both required suites for that exact new head SHA."
          } > pr-body.md
          open_pr="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')"
          if [ -z "$open_pr" ]; then
            gh pr create \
              --base "$DEFAULT_BRANCH" \
              --head "$BRANCH" \
              --title "chore: update manifest for $VERSION" \
              --body-file pr-body.md
          else
            echo "PR $open_pr already owns $BRANCH; leaving it unchanged"
          fi

      # PRs opened with GITHUB_TOKEN intentionally do not trigger other
      # workflows. Dispatch the same required suites explicitly against the
      # exact proposal SHA so the protected default branch remains mergeable
      # without weakening or bypassing its status-check rules.
      - name: Dispatch required checks for manifest proposal
        if: steps.release_state.outputs.action != 'noop-main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.release_state.outputs.branch }}
        run: |
          resolve_head() {
            git ls-remote --exit-code --heads origin "refs/heads/$BRANCH" \
              | awk 'NR == 1 { print $1 }'
          }
          list_runs() {
            gh run list --workflow "$1" --branch "$BRANCH" \
              --event workflow_dispatch --limit 100 \
              --json databaseId,headSha,status,conclusion
          }

          head_sha="$(resolve_head)"
          if [[ ! "$head_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Could not resolve one manifest proposal SHA"
            exit 1
          fi
          for workflow in build.yml security-scan.yml; do
            runs="$(list_runs "$workflow")"
            action="$(node scripts/release/check-dispatch.js --sha "$head_sha" <<< "$runs")"
            if [ "$action" = dispatch ]; then
              before_runs="$RUNNER_TEMP/${workflow}.before-runs.json"
              printf '%s\n' "$runs" > "$before_runs"
              if [ "$(resolve_head)" != "$head_sha" ]; then
                echo "::error::Manifest branch changed before $workflow dispatch; rerun Release"
                exit 1
              fi
              gh workflow run "$workflow" --ref "$BRANCH"
              observed=false
              # GitHub's run-list index can lag workflow_dispatch. Allow just
              # under two minutes, while treating malformed API evidence as an
              # immediate tooling failure rather than misreporting a timeout.
              for attempt in {1..24}; do
                runs="$(list_runs "$workflow")"
                if node scripts/release/check-dispatch.js \
                    --sha "$head_sha" --mode observed \
                    --before "$before_runs" <<< "$runs"; then
                  observed=true
                  break
                else
                  observation_status=$?
                  if [ "$observation_status" -ne 1 ]; then
                    echo "::error::Could not validate $workflow dispatch evidence"
                    exit "$observation_status"
                  fi
                fi
                if [ "$attempt" -lt 24 ]; then sleep 5; fi
              done
              if [ "$observed" != true ]; then
                current_head="$(resolve_head)"
                echo "::error::$workflow did not start for exact proposal $head_sha (current head $current_head); rerun Release"
                exit 1
              fi
            else
              echo "$workflow already has a successful or active run for $head_sha"
            fi
          done

      - name: Summarize immutable rerun
        if: steps.release_state.outputs.action == 'noop-main'
        run: >-
          echo "Verified existing published release, committed manifest, ZIP layout,
          checksum, and anonymous download; rerun made no release or manifest changes."
          >> "$GITHUB_STEP_SUMMARY"
# Registered for Jellyfin Canopy CI (no functional change).
