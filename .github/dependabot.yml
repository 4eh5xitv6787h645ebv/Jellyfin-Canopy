version: 2

# One manifest owner per ecosystem. All version-update PRs target main and are
# subject to the same required Build & Test and Security gates as human PRs.
updates:
  # The root solution owns both the plugin and test projects. A second
  # subdirectory entry would rediscover the plugin packages with another policy.
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "4eh5xitv6787h645ebv"
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      jellyfin-sdk:
        patterns:
          - "Jellyfin.*"
        update-types:
          - "minor"
          - "patch"
      skiasharp:
        patterns:
          - "SkiaSharp*"
        update-types:
          - "minor"
          - "patch"
      dotnet-test-tooling:
        patterns:
          - "Microsoft.NET.Test.Sdk"
          - "xunit*"
          - "coverlet*"
        update-types:
          - "minor"
          - "patch"

  # package.json and package-lock.json are both rooted at the repository root.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "4eh5xitv6787h645ebv"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # requirements-docs.in owns the human-reviewed direct pins; the generated
  # requirements-docs.txt lock carries every transitive hash used by CI.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "4eh5xitv6787h645ebv"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      docs-python-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Compose defaults include the digest-pinned Jellyfin unstable/nightly image
  # and the Node integration fixture. Jellyfin stays outside tooling groups so
  # every moving-nightly digest update is an explicit full-E2E PR.
  - package-ecosystem: "docker-compose"
    directory: "/e2e/docker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "4eh5xitv6787h645ebv"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      e2e-tooling-images:
        patterns:
          - "node"
        update-types:
          - "minor"
          - "patch"

  # Workflow actions remain immutable-SHA pinned. Dependabot updates both the
  # SHA and its same-line version comment; major runtime changes stay separate.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "4eh5xitv6787h645ebv"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
