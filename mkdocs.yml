site_name: Jellyfin Elevate
site_url: https://4eh5xitv6787h645ebv.github.io/Jellyfin-Elevate/
repo_name: 4eh5xitv6787h645ebv/Jellyfin-Elevate
repo_url: https://github.com/4eh5xitv6787h645ebv/Jellyfin-Elevate
site_description: Jellyfin Elevate is an independent fork and extensive modernization of Jellyfin Enhanced, providing an integrated suite of playback, discovery, customization and media-management features for Jellyfin 12.
site_author: Jellyfin Elevate contributors
copyright: Copyright &copy;2026 Jellyfin Elevate contributors. A fork of Jellyfin Enhanced by n00bcodr — made with 💜 for Jellyfin and the community

# Custom theme, built from scratch in ./theme (no framework).
theme:
  name: null
  custom_dir: theme
  locale: en
  static_templates:
    - 404.html

extra:
  404_page: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/4eh5xitv6787h645ebv/Jellyfin-Elevate
      name: GitHub Repository
    - icon: fontawesome/brands/discord
      link: https://discord.gg/EYNFf7y4CG
      name: Jellyfin Community Discord - Jellyfin Elevate Channel

plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'

markdown_extensions:
  - meta
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  # lists
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  # keyboard shortcuts
  - pymdownx.keys
  # simple text formatting
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - mdx_truly_sane_lists


# main tabs/headers
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - The Enhanced Experience: enhanced.md
  - Discover & Request: discover.md
  - Sonarr & Radarr: sonarr-radarr.md
  - Spoiler Guard: spoiler-guard.md
  - Customization: customization.md
  - Reference: reference.md
  - Developer Guide: developers.md
  - Help & Community: help.md
  - About: about.md
