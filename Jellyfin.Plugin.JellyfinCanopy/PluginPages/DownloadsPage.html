<div id="jc-loading">Loading…</div>
<div data-role="content">
  <div class="content-primary jc-downloads-page">
    <div id="jc-downloads-container"></div>
  </div>
</div>
<div id="jc-error" style="display:none">
  Jellyfin Canopy not ready.
</div>
<script>
(function () {
  const MAX_WAIT = 5000;
  const INTERVAL = 50;
  let waited = 0;

  const loadingEl = document.getElementById("jc-loading");
  const errorEl = document.getElementById("jc-error");
  const preferencesPages = Array.from(document.querySelectorAll("#userPluginPreferencesPage"));
  const preferencesPage = preferencesPages.find(p => p.offsetWidth > 0 && p.offsetHeight > 0);

  // Keep this page's own authored container; drop only stray copies that are not
  // inside a visible preferences page. Recreate into our own page (never gated on
  // a visible #userPluginPreferencesPage existing) so the page can't blank out —
  // mirrors BookmarksPage.
  const ownPage = document.querySelector(".jc-downloads-page");
  document.querySelectorAll("#jc-downloads-container").forEach(el => {
    if (ownPage && ownPage.contains(el)) return;
    if (!preferencesPage || !preferencesPage.contains(el)) {
      el.remove();
    }
  });

  if (!ownPage?.querySelector("#jc-downloads-container")) {
    const newContainer = document.createElement("div");
    newContainer.id = "jc-downloads-container";
    const target = ownPage || document.body;
    target.appendChild(newContainer);
  }

  const JC = window.JellyfinCanopy;

  const timer = setInterval(() => {

    if (JC && JC.downloadsPage) {
      clearInterval(timer);

      loadingEl.remove();
      JC.downloadsPage.injectStyles();
      JC.downloadsPage.renderPage();
      JC.downloadsPage.refresh();
      handleClickOnPlay();
      console.log('🪼 Jellyfin Canopy: Downloads Page Loaded.');

      // Use the main module's startPolling which properly respects config and visibility
      // Mark the page as visible for the polling logic
      if (JC.downloadsPage._state) {
        JC.downloadsPage._state._pluginPageVisible = true;
      } else {
        JC.downloadsPage._pluginPageVisible = true; // fallback for older builds
      }

      // Start polling - will use the interval from pluginConfig or default to 30 seconds
      if (typeof JC.downloadsPage.startPolling === 'function') {
        JC.downloadsPage.startPolling();
      } else {
        // Fallback: implement auto-refresh for this page
        startPollingFallback();
      }
      return;
    }

    waited += INTERVAL;
    if (waited >= MAX_WAIT) {
      clearInterval(timer);

      loadingEl.style.display = "none";
      errorEl.style.display = "block";
    }
  }, INTERVAL);
})();

function startPollingFallback() {
  const JC = window.JellyfinCanopy;
  if (!JC || !JC.downloadsPage || typeof JC.downloadsPage.refresh !== "function") return;

  // Check if polling is enabled
  if (!JC.pluginConfig?.DownloadsPagePollingEnabled) {
    return;
  }

  const pollIntervalSeconds = JC.pluginConfig?.DownloadsPollIntervalSeconds !== undefined
    ? JC.pluginConfig.DownloadsPollIntervalSeconds
    : 30;

  if (JC.downloadsPage._pluginPagePollTimer) {
    clearInterval(JC.downloadsPage._pluginPagePollTimer);
  }

  const POLL_INTERVAL = pollIntervalSeconds * 1000;
  JC.downloadsPage._pluginPagePollTimer = setInterval(() => {
    const container = document.getElementById("jc-downloads-container");
    // Stop polling once the page is gone (SPA nav away removes the container):
    // beforeunload does not fire on in-app navigation, so clear the interval here
    // or it runs for the rest of the session.
    if (!container) {
      clearInterval(JC.downloadsPage._pluginPagePollTimer);
      JC.downloadsPage._pluginPagePollTimer = null;
      return;
    }
    // Read the same visibility flag the load block set: newer builds set it on
    // _state, older builds on the page object itself.
    const pluginPageVisible = JC.downloadsPage._state
      ? JC.downloadsPage._state._pluginPageVisible
      : JC.downloadsPage._pluginPageVisible;
    if (container.offsetHeight > 0 && container.offsetWidth > 0 && pluginPageVisible) {
      JC.downloadsPage.refresh();
    }
  }, POLL_INTERVAL);
}

// Clean up polling when page is hidden or document is unloaded
window.addEventListener('beforeunload', () => {
  const JC = window.JellyfinCanopy;
  if (JC?.downloadsPage?._pluginPagePollTimer) {
    clearInterval(JC.downloadsPage._pluginPagePollTimer);
  }
  if (JC?.downloadsPage?._state) {
    JC.downloadsPage._state._pluginPageVisible = false;
  }
  if (JC?.downloadsPage) {
    JC.downloadsPage._pluginPageVisible = false;
  }
});

function handleClickOnPlay() {
  if (handleClickOnPlay._initialized) return;
  handleClickOnPlay._initialized = true;

  document.addEventListener("click", (e) => {
    const playBtn = e.target.closest(".jc-request-watch-btn");
    if (!playBtn) return;

    e.preventDefault();

    const mediaId = playBtn.getAttribute("data-media-id");
    if (mediaId && window.Emby?.Page?.showItem) {
      window.Emby.Page.showItem(mediaId);
    }
  });
}
</script>
