<div id="jc-loading">Loading...</div>
<div data-role="content">
  <div class="content-primary jc-bookmarks-page">
    <div class="sections bookmarks"></div>
  </div>
</div>
<div id="jc-error" style="display:none">
  Jellyfin Canopy not ready.
</div>
<script>
(function () {
  const MAX_WAIT = 5000;
  const INTERVAL = 50;
  let waited = 0;

  const loadingEl = document.getElementById("jc-loading");
  const errorEl = document.getElementById("jc-error");
  const preferencesPages = Array.from(document.querySelectorAll("#userPluginPreferencesPage"));
  const preferencesPage = preferencesPages.find(p => p.offsetWidth > 0 && p.offsetHeight > 0);

  // Scope to this page's container -- exclude the standalone page (#jc-bookmarks-standalone-page)
  // which may also have a .jc-bookmarks-page in the DOM.
  const allPages = Array.from(document.querySelectorAll(".jc-bookmarks-page"));
  const ownPage = allPages.find(el => !el.closest("#jc-bookmarks-standalone-page"));
  document.querySelectorAll(".sections.bookmarks").forEach(el => {
    if (ownPage && ownPage.contains(el)) return;
    if (!preferencesPage || !preferencesPage.contains(el)) {
      el.remove();
    }
  });

  if (!ownPage?.querySelector(".sections.bookmarks")) {
    const newContainer = document.createElement("div");
    newContainer.className = "sections bookmarks";
    const target = ownPage || document.body;
    target.appendChild(newContainer);
  }

  const timer = setInterval(() => {
    const JC = window.JellyfinCanopy;

    if (JC && JC.userConfig && JC.bookmarks) {
      clearInterval(timer);
      loadingEl.remove();
      console.log("🪼 Jellyfin Canopy: Bookmarks Page Loaded.");
      return;
    }

    waited += INTERVAL;
    if (waited >= MAX_WAIT) {
      clearInterval(timer);
      loadingEl.style.display = "none";
      errorEl.style.display = "block";
    }
  }, INTERVAL);
})();
</script>
